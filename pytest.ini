[pytest]
pythonpath = .
testpaths = tests
addopts =
markers =
    feature: integration/feature-level tests with stubs for speed and stability
    e2e: end-to-end under real conditions
    qt: tests that require a Qt event loop (pytest-qt)
asyncio_mode = strict
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore:builtin type SwigPyPacked has no __module__ attribute:DeprecationWarning
    ignore:builtin type SwigPyObject has no __module__ attribute:DeprecationWarning
    ignore:builtin type swigvarlink has no __module__ attribute:DeprecationWarning
    ignore:defusedxml.cElementTree is deprecated:DeprecationWarning
